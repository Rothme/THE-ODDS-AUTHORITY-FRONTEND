<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoalScope — 2+ Goals Predictor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── DESIGN SYSTEM ─────────────────────────────────────────── */
:root {
  --bg:    #03050a;
  --s1:    #080d16;
  --s2:    #0c1220;
  --s3:    #101828;
  --b1:    #162030;
  --b2:    #1e3048;
  --b3:    #243860;
  --green: #00f5c8;
  --gd:    rgba(0,245,200,.10);
  --gg:    rgba(0,245,200,.22);
  --red:   #ff3d6b;
  --amber: #ffb800;
  --blue:  #3d9eff;
  --purple:#a855f7;
  --text:  #dde8f5;
  --m1:    #4a637a;
  --m2:    #2d4155;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Syne',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}
/* grid bg */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 70% 50% at 8% 5%, rgba(0,245,200,.05) 0%,transparent 55%),
    radial-gradient(ellipse 55% 60% at 92% 92%,rgba(61,158,255,.04) 0%,transparent 55%),
    repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(22,32,48,.25) 39px,rgba(22,32,48,.25) 40px),
    repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(22,32,48,.25) 39px,rgba(22,32,48,.25) 40px);
}
.wrap{max-width:1080px;margin:0 auto;padding:0 22px;position:relative;z-index:1}

/* ── HEADER ─────────────────────────────────────────────────── */
header{
  padding:14px 0;border-bottom:1px solid var(--b1);
  position:sticky;top:0;z-index:200;
  background:rgba(3,5,10,.96);backdrop-filter:blur(18px);
}
.hrow{display:flex;align-items:center;gap:14px}
.brand{font-family:'Orbitron',monospace;font-weight:900;font-size:19px;letter-spacing:3px;color:var(--green);text-shadow:0 0 20px var(--gg)}
.bsub{font-family:'Space Mono',monospace;font-size:10px;color:var(--m1);letter-spacing:2px;text-transform:uppercase}
.hbadge{
  display:inline-flex;align-items:center;gap:5px;border-radius:2px;
  padding:4px 11px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;
}
.hbadge.live{background:rgba(0,245,200,.08);border:1px solid rgba(0,245,200,.25);color:var(--green)}
.hbadge.info{background:transparent;border:1px solid var(--b2);color:var(--m1)}
.hdot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:hdot 1.5s ease infinite;flex-shrink:0}
@keyframes hdot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.6)}}

/* ── HERO ─────────────────────────────────────────────────── */
.hero{padding:52px 0 36px;text-align:center}
.eyebrow{
  font-family:'Space Mono',monospace;font-size:11px;
  color:var(--green);letter-spacing:3px;text-transform:uppercase;
  margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:10px;
}
.el{width:32px;height:1px;background:var(--green);opacity:.4}
.htitle{
  font-family:'Orbitron',monospace;
  font-size:clamp(24px,4.5vw,48px);font-weight:900;line-height:1.1;margin-bottom:10px;
  background:linear-gradient(135deg,#fff 0%,var(--green) 50%,var(--blue) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hdesc{color:var(--m1);font-size:14px;text-align:center;max-width:480px;margin:0 auto 36px;line-height:1.7}

/* ── SEARCH ─────────────────────────────────────────────────── */
.search-area{max-width:580px;margin:0 auto 40px;position:relative}
.slabel{
  display:block;font-family:'Space Mono',monospace;font-size:10px;
  color:var(--green);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;
}
.sbox{position:relative}
.tinput{
  width:100%;background:var(--s1);border:1.5px solid var(--b2);
  color:var(--text);font-family:'Syne',sans-serif;font-size:16px;font-weight:600;
  padding:17px 54px 17px 18px;border-radius:3px;outline:none;
  transition:border-color .2s,box-shadow .2s;letter-spacing:.3px;
}
.tinput:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(0,245,200,.08)}
.tinput::placeholder{color:var(--m2);font-weight:400;font-size:15px}
.sico{position:absolute;right:18px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--m1);pointer-events:none}
.sspin{
  position:absolute;right:18px;top:50%;transform:translateY(-50%);
  width:18px;height:18px;border:2px solid var(--b2);border-top-color:var(--green);
  border-radius:50%;animation:sspin .7s linear infinite;display:none;
}
@keyframes sspin{to{transform:translateY(-50%) rotate(360deg)}}

/* DROPDOWN */
.sug{
  position:absolute;top:calc(100% + 6px);left:0;right:0;
  background:var(--s1);border:1px solid var(--b2);border-radius:3px;
  z-index:400;display:none;max-height:300px;overflow-y:auto;
  box-shadow:0 16px 48px rgba(0,0,0,.55);
}
.sug-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;cursor:pointer;
  border-bottom:1px solid var(--b1);transition:background .14s;
}
.sug-item:last-child{border-bottom:none}
.sug-item:hover,.sug-item.ak{background:rgba(0,245,200,.07)}
.sug-logo{width:32px;height:32px;border-radius:50%;object-fit:contain;background:var(--s2);padding:2px;border:1px solid var(--b1);flex-shrink:0}
.sug-ph{width:32px;height:32px;border-radius:50%;background:var(--s2);border:1px solid var(--b1);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.sug-name{font-weight:700;font-size:14px;color:var(--text)}
.sug-meta{font-family:'Space Mono',monospace;font-size:10px;color:var(--m1);margin-top:2px;letter-spacing:.3px}
.sug-ctry{font-family:'Space Mono',monospace;font-size:9px;color:var(--blue);background:rgba(61,158,255,.08);border:1px solid rgba(61,158,255,.2);padding:2px 7px;border-radius:2px;margin-left:auto;white-space:nowrap;flex-shrink:0}
.sug-nores{padding:18px;text-align:center;font-family:'Space Mono',monospace;font-size:12px;color:var(--m1)}

/* ── LOADING ────────────────────────────────────────────────── */
#loadWrap{display:none;text-align:center;padding:56px 0}
.lring{
  width:54px;height:54px;border-radius:50%;
  border:2px solid var(--b2);border-top-color:var(--green);border-right-color:var(--green);
  animation:lspin .85s linear infinite;margin:0 auto 20px;
  box-shadow:0 0 18px var(--gg);
}
@keyframes lspin{to{transform:rotate(360deg)}}
.lsteps{max-width:290px;margin:0 auto;text-align:left}
.lstep{display:flex;align-items:center;gap:10px;font-family:'Space Mono',monospace;font-size:11px;color:var(--m1);padding:5px 0;letter-spacing:.4px;transition:color .3s}
.lstep.done{color:var(--green)}
.lsico{width:14px;flex-shrink:0;text-align:center}

/* ── ERROR ───────────────────────────────────────────────────  */
.errbox{background:rgba(255,61,107,.06);border:1px solid rgba(255,61,107,.25);border-radius:3px;padding:18px 20px;margin:16px 0;display:none}
.errbox p{font-family:'Space Mono',monospace;font-size:12px;color:var(--red);letter-spacing:.4px;line-height:1.6}

/* ── REPORT ─────────────────────────────────────────────────── */
#report{display:none;padding-bottom:90px}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* Team hero strip */
.team-strip{
  display:flex;align-items:center;gap:20px;padding:24px 28px;
  background:var(--s1);border:1px solid var(--b1);border-radius:4px;
  margin-bottom:24px;position:relative;overflow:hidden;
}
.team-strip::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(0,245,200,.04) 0%,transparent 50%);
  pointer-events:none;
}
.tlogo{width:68px;height:68px;object-fit:contain;border-radius:50%;background:var(--s2);padding:4px;border:2px solid var(--b2);flex-shrink:0}
.tlogo-ph{width:68px;height:68px;border-radius:50%;background:var(--s2);border:2px solid var(--b2);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.tname{font-family:'Orbitron',monospace;font-size:clamp(17px,3vw,26px);font-weight:900;color:var(--text);margin-bottom:4px}
.tmeta{font-family:'Space Mono',monospace;font-size:11px;color:var(--m1);letter-spacing:.5px}
.tleague{font-family:'Space Mono',monospace;font-size:11px;color:var(--blue);margin-top:4px}
.back-btn{
  margin-left:auto;background:transparent;border:1px solid var(--b2);color:var(--m1);
  font-family:'Space Mono',monospace;font-size:10px;padding:7px 14px;border-radius:2px;
  cursor:pointer;letter-spacing:1px;transition:all .2s;white-space:nowrap;flex-shrink:0;
}
.back-btn:hover{border-color:var(--green);color:var(--green)}

/* Season stats bar */
.season-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));
  gap:10px;margin-bottom:24px;
}
.sg-cell{background:var(--s1);border:1px solid var(--b1);border-radius:3px;padding:14px 10px;text-align:center}
.sg-val{font-family:'Orbitron',monospace;font-size:22px;font-weight:700;line-height:1;margin-bottom:4px}
.sg-lbl{font-family:'Space Mono',monospace;font-size:9px;color:var(--m1);letter-spacing:1px;text-transform:uppercase}

/* Section divider */
.sdiv{
  display:flex;align-items:center;gap:14px;
  font-family:'Orbitron',monospace;font-size:11px;font-weight:700;
  color:var(--m1);letter-spacing:3px;text-transform:uppercase;margin:26px 0 16px;
}
.sdiv .sacc{color:var(--green)}
.sdiv::after{content:'';flex:1;height:1px;background:var(--b1)}

/* Fixture card */
.fx-list{display:flex;flex-direction:column;gap:16px}
.fxcard{
  background:var(--s1);border:1px solid var(--b1);border-radius:4px;
  overflow:hidden;transition:border-color .2s;animation:fadeUp .35s ease both;
}
.fxcard:hover{border-color:var(--b3)}

/* Fixture header */
.fx-hdr{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  padding:12px 18px;border-bottom:1px solid var(--b1);
  background:var(--s2);
}
.fx-league{font-size:11px;font-weight:700;color:var(--blue)}
.fx-date{font-family:'Space Mono',monospace;font-size:10px;color:var(--m1);margin-left:auto}

/* Teams row */
.fx-teams{
  display:grid;grid-template-columns:1fr auto 1fr;
  align-items:center;gap:14px;padding:18px 20px;
}
.fx-side{display:flex;align-items:center;gap:10px}
.fx-side.away{flex-direction:row-reverse;text-align:right}
.fxtlogo{width:38px;height:38px;object-fit:contain;border-radius:50%;background:var(--s2);padding:2px;border:1px solid var(--b1);flex-shrink:0}
.fxtlogo-ph{width:38px;height:38px;border-radius:50%;background:var(--s2);border:1px solid var(--b1);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.fxtname{font-weight:800;font-size:15px;line-height:1.2}
.fxtname.subject{color:var(--green)}
.vs-block{text-align:center}
.vs-txt{font-family:'Orbitron',monospace;font-size:12px;color:var(--m2);font-weight:700}
.vs-time{font-family:'Space Mono',monospace;font-size:10px;color:var(--m1);margin-top:3px}

/* Prediction panel */
.pred{padding:20px;background:var(--s2);border-top:1px solid var(--b1)}
.pred-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:14px}
.pred-num{display:flex;align-items:flex-end;gap:7px}
.pbig{font-family:'Orbitron',monospace;font-size:42px;font-weight:900;line-height:1}
.ppct{font-family:'Orbitron',monospace;font-size:17px;color:var(--m1);margin-bottom:4px}
.plab{font-family:'Space Mono',monospace;font-size:9px;color:var(--m1);letter-spacing:1px;text-transform:uppercase}
.vbadge{
  display:inline-flex;align-items:center;
  font-family:'Space Mono',monospace;font-size:11px;
  padding:6px 14px;border-radius:2px;letter-spacing:1px;text-transform:uppercase;font-weight:700;
}
.vbadge.likely{background:rgba(0,245,200,.09);color:var(--green);border:1px solid rgba(0,245,200,.28)}
.vbadge.possible{background:rgba(255,184,0,.09);color:var(--amber);border:1px solid rgba(255,184,0,.28)}
.vbadge.unlikely{background:rgba(255,61,107,.07);color:var(--red);border:1px solid rgba(255,61,107,.22)}

.pbar{height:4px;background:var(--b2);border-radius:2px;overflow:hidden;margin-bottom:16px}
.pbar-fill{height:100%;border-radius:2px}

/* Metrics */
.mxgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(115px,1fr));gap:8px;margin-bottom:14px}
.mxbox{background:var(--s3);border:1px solid var(--b1);border-radius:3px;padding:12px 8px;text-align:center}
.mxbox.hi{border-color:rgba(0,245,200,.3);background:rgba(0,245,200,.04)}
.mxbox.wa{border-color:rgba(255,184,0,.3);background:rgba(255,184,0,.04)}
.mxbox.da{border-color:rgba(255,61,107,.25);background:rgba(255,61,107,.03)}
.mxval{font-family:'Orbitron',monospace;font-size:19px;font-weight:700;line-height:1;margin-bottom:4px}
.mxlbl{font-family:'Space Mono',monospace;font-size:9px;color:var(--m1);letter-spacing:1px;text-transform:uppercase}

/* Form letters */
.form-row{display:flex;align-items:center;gap:4px;margin-top:10px;flex-wrap:wrap}
.flbl{font-family:'Space Mono',monospace;font-size:10px;color:var(--m1);letter-spacing:1px;margin-right:4px}
.fl{width:20px;height:20px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:10px;font-weight:700}
.fl.W{background:rgba(0,245,200,.15);color:var(--green)}
.fl.D{background:rgba(255,184,0,.12);color:var(--amber)}
.fl.L{background:rgba(255,61,107,.1);color:var(--red)}

/* Tags */
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:12px}
.tag{font-family:'Space Mono',monospace;font-size:9px;padding:3px 8px;border-radius:2px;letter-spacing:.5px}
.tag.hot{background:rgba(0,245,200,.07);color:var(--green);border:1px solid rgba(0,245,200,.2)}
.tag.warm{background:rgba(255,184,0,.07);color:var(--amber);border:1px solid rgba(255,184,0,.2)}
.tag.cold{background:rgba(255,61,107,.06);color:var(--red);border:1px solid rgba(255,61,107,.2)}
.tag.info{background:rgba(61,158,255,.07);color:var(--blue);border:1px solid rgba(61,158,255,.2)}

/* Analysis text */
.analysis{
  background:var(--s3);border:1px solid var(--b1);
  border-left:3px solid var(--green);border-radius:2px;
  padding:14px 16px;margin-top:14px;
}
.analysis p{font-size:13px;color:var(--m1);line-height:1.75;font-style:italic}
.analysis strong{color:var(--text);font-style:normal}

/* H2H section */
.h2h-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.h2h-bar-wrap{flex:1;height:8px;background:var(--b2);border-radius:4px;overflow:hidden;display:flex}
.h2h-seg{height:100%;transition:width .8s ease}

/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--s1)}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}

@media(max-width:580px){
  .fx-teams{grid-template-columns:1fr;gap:8px}
  .fx-side.away{flex-direction:row;text-align:left}
  .mxgrid{grid-template-columns:repeat(2,1fr)}
  .team-strip{flex-wrap:wrap}
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="wrap hrow">
    <svg width="36" height="36" viewBox="0 0 36 36">
      <polygon points="18,2 32,10 32,26 18,34 4,26 4,10" fill="none" stroke="#00f5c8" stroke-width="1.5"/>
      <polygon points="18,7 28,13 28,23 18,29 8,23 8,13" fill="rgba(0,245,200,.06)"/>
      <text x="18" y="22" text-anchor="middle" font-family="Orbitron" font-size="8" font-weight="900" fill="#00f5c8">GS</text>
    </svg>
    <div>
      <div class="brand">GoalScope</div>
      <div class="bsub">2+ Goals Predictor · Powered by Live Data</div>
    </div>
    <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
      <span class="hbadge live"><span class="hdot"></span>LIVE</span>
      <span class="hbadge info" id="statusBadge">Connecting…</span>
    </div>
  </div>
</header>

<div class="wrap">

  <!-- HERO -->
  <div class="hero">
    <div class="eyebrow"><span class="el"></span>Real-Time Analysis · AI Prediction Engine<span class="el"></span></div>
    <div class="htitle">2+ Goals Predictor</div>
    <p class="hdesc">Type any team name, pick from live suggestions, and receive an instant real-time prediction report — no account needed.</p>
  </div>

  <!-- SEARCH -->
  <div class="search-area">
    <label class="slabel" for="tsearch">⚽ Search any team worldwide</label>
    <div class="sbox">
      <input class="tinput" type="text" id="tsearch"
        placeholder="e.g. Arsenal, Real Madrid, Flamengo, Al Ahly…"
        autocomplete="off" spellcheck="false">
      <span class="sico" id="sico">🔍</span>
      <div class="sspin" id="sspin"></div>
      <div class="sug" id="sug"></div>
    </div>
  </div>

  <!-- ERROR -->
  <div class="errbox" id="errbox"><p id="errmsg"></p></div>

  <!-- LOADING -->
  <div id="loadWrap">
    <div class="lring"></div>
    <div class="lsteps" id="lsteps"></div>
  </div>

  <!-- REPORT -->
  <div id="report"></div>

</div>

<script>
// ── CONFIG ─────────────────────────────────────────────────────
// ⚡ Point this at your deployed backend URL.
// During local development: 'http://localhost:3000'
// After deploying to Render: 'https://your-service-name.onrender.com'
var API_BASE = 'https://the-odds-authority-backend.onrender.com';

// ── STARTUP: health check ──────────────────────────────────────
(async function checkHealth() {
  try {
    var r = await fetch(API_BASE + '/health');
    var d = await r.json();
    document.getElementById('statusBadge').textContent =
      d.apiKeySet ? 'API Connected' : 'API Key Missing';
    if (!d.apiKeySet) showErr('Backend reachable but API key not configured. Set API_FOOTBALL_KEY in your backend .env');
  } catch(e) {
    document.getElementById('statusBadge').textContent = 'Backend Offline';
    showErr('Cannot reach backend. Make sure your server is running and API_BASE is set correctly in this file.');
  }
})();

// ── SEARCH / AUTOCOMPLETE ───────────────────────────────────────
var input = document.getElementById('tsearch');
var sugBox = document.getElementById('sug');
var sugItems = [];
var activeIdx = -1;
var debTimer = null;
// Current season — updated automatically from API response
var SEASON = new Date().getMonth() >= 6 ? new Date().getFullYear() : new Date().getFullYear() - 1;

input.addEventListener('input', function() {
  var v = this.value.trim();
  clearTimeout(debTimer);
  hideSug();
  if (v.length < 3) { spinOff(); return; }
  spinOn();
  debTimer = setTimeout(function(){ doSearch(v); }, 380);
});

input.addEventListener('keydown', function(e) {
  if (sugBox.style.display !== 'block') return;
  if (e.key === 'ArrowDown') { activeIdx = Math.min(activeIdx+1, sugItems.length-1); highlightSug(); e.preventDefault(); }
  else if (e.key === 'ArrowUp') { activeIdx = Math.max(activeIdx-1, 0); highlightSug(); e.preventDefault(); }
  else if (e.key === 'Enter' && activeIdx >= 0) { pickTeam(sugItems[activeIdx]); e.preventDefault(); }
  else if (e.key === 'Escape') hideSug();
});
document.addEventListener('click', function(e) {
  if (!input.contains(e.target) && !sugBox.contains(e.target)) hideSug();
});

function spinOn()  { document.getElementById('sico').style.display='none'; document.getElementById('sspin').style.display='block'; }
function spinOff() { document.getElementById('sico').style.display='block'; document.getElementById('sspin').style.display='none'; }

async function doSearch(q) {
  try {
    var r = await fetch(API_BASE + '/api/teams?search=' + encodeURIComponent(q));
    var d = await r.json();
    spinOff();
    if (d.error) { showErr(d.message); return; }
    var results = (d.response || []).slice(0, 8);
    sugItems = results;
    activeIdx = -1;
    if (!results.length) { sugBox.innerHTML = '<div class="sug-nores">No teams found — try a different spelling</div>'; sugBox.style.display = 'block'; return; }
    sugBox.innerHTML = results.map(function(it, i) {
      var t = it.team, v = it.venue || {};
      var logo = t.logo
        ? '<img class="sug-logo" src="'+t.logo+'" onerror="this.style.display=\'none\'">'
        : '<div class="sug-ph">⚽</div>';
      return '<div class="sug-item" data-i="'+i+'" onclick="pickTeamIdx('+i+')">'
        + logo
        + '<div style="flex:1;min-width:0">'
        + '<div class="sug-name">'+esc(t.name)+'</div>'
        + '<div class="sug-meta">'+(v.city||t.country||'')+(t.founded?' · Est. '+t.founded:'')+'</div>'
        + '</div>'
        + '<span class="sug-ctry">'+esc(t.country||'')+'</span>'
        + '</div>';
    }).join('');
    sugBox.style.display = 'block';
  } catch(e) { spinOff(); showErr('Search failed: ' + e.message); }
}

function hideSug() { sugBox.style.display='none'; sugBox.innerHTML=''; activeIdx=-1; }
function highlightSug() {
  sugBox.querySelectorAll('.sug-item').forEach(function(el,i){ el.classList.toggle('ak', i===activeIdx); });
}
function pickTeamIdx(i) { pickTeam(sugItems[i]); }
function pickTeam(item) {
  input.value = item.team.name;
  hideSug();
  loadTeam(item.team);
}

// ── LOAD TEAM DATA ──────────────────────────────────────────────
var LSTEPS = [
  '🔍  Finding upcoming fixtures…',
  '📊  Loading season statistics…',
  '🔗  Fetching head-to-head history…',
  '⚙️  Running Poisson xG model…',
  '📈  Applying 8 predictive metrics…',
  '✅  Building your prediction report…'
];
var lstTimer = null, lstIdx = 0;

function startLoad() {
  var el = document.getElementById('lsteps'); el.innerHTML = ''; lstIdx = 0;
  LSTEPS.forEach(function(s,i){
    var d = document.createElement('div'); d.className = 'lstep'; d.id = 'ls'+i;
    d.innerHTML = '<span class="lsico">○</span><span>'+s+'</span>';
    el.appendChild(d);
  });
  lstTimer = setInterval(function(){
    if (lstIdx < LSTEPS.length) {
      var r = document.getElementById('ls'+lstIdx);
      if (r) { r.classList.add('done'); r.querySelector('.lsico').textContent = '✓'; }
      lstIdx++;
    } else clearInterval(lstTimer);
  }, 520);
}
function stopLoad() { clearInterval(lstTimer); }

async function loadTeam(team) {
  hideErr();
  document.getElementById('report').style.display = 'none';
  document.getElementById('report').innerHTML = '';
  document.getElementById('loadWrap').style.display = 'block';
  startLoad();

  try {
    // 1. Upcoming fixtures
    var fxData = await apiFetch('/api/fixtures?team='+team.id+'&next=10');
    var fixtures = fxData.response || [];

    // 2. Fall back to last 5 recent if no upcoming found
    if (!fixtures.length) {
      var pastData = await apiFetch('/api/fixtures/last?team='+team.id+'&last=5');
      fixtures = pastData.response || [];
    }

    // 3. Discover league + season — always use the season returned by the API
    var leagueId = null, leagueName = '', leagueCountry = '', leagueLogo = '';
    if (fixtures.length) {
      leagueId      = fixtures[0].league.id;
      leagueName    = fixtures[0].league.name;
      leagueCountry = fixtures[0].league.country;
      leagueLogo    = fixtures[0].league.logo;
      // Use season directly from the fixture response — most reliable source
      SEASON        = fixtures[0].league.season || SEASON;
    } else {
      // No fixtures at all — ask the API which leagues this team is currently in
      var lgData = await apiFetch('/api/leagues?team='+team.id+'&current=true');
      var legs = lgData.response || [];
      if (legs.length) {
        leagueId      = legs[0].league.id;
        leagueName    = legs[0].league.name;
        leagueCountry = legs[0].country?.name || '';
        leagueLogo    = legs[0].league.logo;
        // Find the current season year from the seasons array
        var currentSeason = (legs[0].seasons || []).find(function(s){ return s.current === true; });
        SEASON = currentSeason ? currentSeason.year : SEASON;
      }
    }

    // 4. Season statistics
    var stats = null;
    if (leagueId) {
      try {
        var stData = await apiFetch('/api/stats?team='+team.id+'&league='+leagueId+'&season='+SEASON);
        stats = stData.response || null;
      } catch(e) { /* non-fatal */ }
    }

    // 5. Head-to-head for first fixture
    var h2hData = null;
    if (fixtures.length) {
      var hId = fixtures[0].teams.home.id, aId = fixtures[0].teams.away.id;
      try {
        var h2h = await apiFetch('/api/h2h?h2h='+hId+'-'+aId+'&last=10');
        h2hData = h2h.response || [];
      } catch(e) { /* non-fatal */ }
    }

    stopLoad();
    document.getElementById('loadWrap').style.display = 'none';
    renderReport(team, fixtures, stats, leagueName, leagueCountry, leagueLogo, h2hData);
    document.getElementById('report').style.display = 'block';

  } catch(e) {
    stopLoad();
    document.getElementById('loadWrap').style.display = 'none';
    showErr(e.message);
  }
}

async function apiFetch(path) {
  var r = await fetch(API_BASE + path);
  if (!r.ok) {
    var body = {}; try { body = await r.json(); } catch(x) {}
    throw new Error(body.message || 'Server error ' + r.status);
  }
  return r.json();
}

// ── PREDICTION ENGINE ───────────────────────────────────────────
function pois(lam, k) {
  var l = Math.max(lam, .001), lp = k * Math.log(l) - l, lf = 0;
  for (var i = 1; i <= k; i++) lf += Math.log(i);
  return Math.exp(lp - lf);
}
function p2(lam) { return Math.max(0, Math.min(1, 1 - pois(lam,0) - pois(lam,1))); }

function buildPred(stats, fixture, team) {
  var m = {};
  if (stats) {
    var gf = stats.goals?.for?.average, ga = stats.goals?.against?.average;
    m.gs   = parseFloat(gf?.total || gf?.home || 1.3);
    m.gc   = parseFloat(ga?.total || ga?.home || 1.3);
    m.cs   = (stats.clean_sheet?.total||0) / Math.max(stats.fixtures?.played?.total||1,1);
    m.fts  = (stats.failed_to_score?.total||0) / Math.max(stats.fixtures?.played?.total||1,1);
    m.wins = stats.fixtures?.wins?.total||0;
    m.draws= stats.fixtures?.draws?.total||0;
    m.loss = stats.fixtures?.loses?.total||0;
    m.pl   = stats.fixtures?.played?.total||1;
    m.sot  = (stats.shots?.on?.total||0) / Math.max(m.pl,1);
    m.form = (stats.form||'').slice(-8);
  } else {
    m.gs=1.3;m.gc=1.3;m.cs=.2;m.fts=.2;m.wins=0;m.draws=0;m.loss=0;m.pl=1;m.sot=4;m.form='';
  }

  var isH   = fixture ? fixture.teams.home.id === team.id : true;
  var hf    = isH ? 1.12 : 0.88;
  var lgAvg = 2.65;

  // xG composite
  var xgRaw = Math.max(m.gs, m.sot > 0 ? m.sot * 0.12 : m.gs);
  var xgAdj = xgRaw * hf;
  var hist  = m.gs * hf;
  var lgF   = Math.min(1.3, Math.max(.7, (m.gs + m.gc) / lgAvg));

  // Form
  var fc = m.form.replace(/[^WDL]/g,'').split('').slice(-6);
  var fw=0,fd=0,fl=0; fc.forEach(function(c){if(c==='W')fw++;else if(c==='D')fd++;else fl++;});
  var fs = (fw+fd+fl)>0 ? (fw*3+fd)/((fw+fd+fl)*3) : .5;
  var fMult = .85 + fs * .3;

  var lam  = (xgAdj*.35 + hist*.35 + (m.sot*.1*hf)*.15 + xgAdj*lgF*.15) * fMult;
  var pois2 = p2(lam);

  // Derived rates
  var btts = Math.min(.85, Math.max(.15, m.gs*.3 + (1-m.cs)*.5 + .2));
  var o25  = Math.min(.9,  Math.max(.1,  (m.gs+m.gc)/(lgAvg*1.6)));
  var opp  = Math.min(.08, (m.gc-1.2)*.04);
  var csPen= m.cs * .1;

  var prob = (pois2*.35 + o25*.25 + btts*.15 + pois2*.15 + fs*.10) - csPen + opp;
  prob = Math.max(.05, Math.min(.96, prob));

  var vd = prob>=.65?'likely':prob>=.45?'possible':'unlikely';
  var vl = prob>=.65?'✦ Likely 2+ Goals':prob>=.45?'◆ Possible 2+ Goals':'✕ Unlikely 2+ Goals';

  var tags=[];
  if(xgAdj>1.8)   tags.push({l:'High xG',c:'hot'});
  if(fs>.7)        tags.push({l:'Strong Form',c:'hot'});
  if(o25>.6)       tags.push({l:'High-Scoring',c:'hot'});
  if(btts>.55)     tags.push({l:'BTTS Likely',c:'warm'});
  if(isH)          tags.push({l:'Home Advantage',c:'info'});
  else             tags.push({l:'Away Side',c:'info'});
  if(m.gc>1.6)     tags.push({l:'Weak Opp Defence',c:'hot'});
  if(m.cs>.35)     tags.push({l:'Clean Sheet Risk',c:'cold'});
  if(m.fts>.3)     tags.push({l:'Goal Drought Risk',c:'cold'});
  if(m.sot>5.5)    tags.push({l:'High Shot Volume',c:'warm'});

  var wr = m.pl>0 ? (m.wins/m.pl*100).toFixed(0)+'%' : 'N/A';
  var narrative =
    '<strong>'+esc(team.name)+'</strong> score <strong>'+m.gs.toFixed(2)+' goals/game</strong> on average. '
    +'Win rate: <strong>'+wr+'</strong> over '+m.pl+' games. '
    +(fs>.6?'Form is <strong>strong</strong>, adding an upward multiplier. ':fs<.35?'Form is <strong>poor</strong>, reducing the estimate. ':'Form is <strong>moderate</strong>. ')
    +(isH?'<strong>Home advantage</strong> boosts attacking lambda by 12%. ':'Playing <strong>away</strong> applies a 12% downward adjustment. ')
    +'Clean sheet rate: <strong>'+(m.cs*100).toFixed(0)+'%</strong>. '
    +'Composite xG lambda (λ): <strong>'+lam.toFixed(2)+'</strong>. '
    +'Poisson base probability: <strong>'+(pois2*100).toFixed(1)+'%</strong>. '
    +'Ensemble final score: <strong>'+(prob*100).toFixed(1)+'%</strong>.';

  return {
    prob, vd, vl, tags, narrative, isH,
    xg: xgAdj.toFixed(2), xgNum: xgAdj,
    lam: lam.toFixed(2),
    btts, o25, fs, fc,
    gs: m.gs.toFixed(2), gc: m.gc.toFixed(2),
    cs: (m.cs*100).toFixed(0),
    wins:m.wins, draws:m.draws, loss:m.loss, pl:m.pl
  };
}

// ── RENDER ──────────────────────────────────────────────────────
function renderReport(team, fixtures, stats, leagueName, leagueCountry, leagueLogo, h2hData) {
  var logo = team.logo
    ? '<img class="tlogo" src="'+team.logo+'" onerror="this.outerHTML=\'<div class=tlogo-ph>⚽</div>\'">'
    : '<div class="tlogo-ph">⚽</div>';

  var html = '<div class="team-strip">'
    + logo
    + '<div style="flex:1;min-width:0">'
    + '<div class="tname">'+esc(team.name)+'</div>'
    + '<div class="tmeta">'+esc(team.country||'')+(team.founded?' · Est. '+team.founded:'')+'</div>'
    + (leagueName?'<div class="tleague">⚽ '+esc(leagueName)+' · '+esc(leagueCountry)+' · Season '+SEASON+'</div>':'')
    + '</div>'
    + '<button class="back-btn" onclick="clearReport()">← New Search</button>'
    + '</div>';

  // Season stats
  if (stats) {
    var gf = stats.goals?.for?.total?.total||0;
    var ga = stats.goals?.against?.total?.total||0;
    var cs = stats.clean_sheet?.total||0;
    var fts= stats.failed_to_score?.total||0;
    var pl = stats.fixtures?.played?.total||0;
    var w  = stats.fixtures?.wins?.total||0;
    var d  = stats.fixtures?.draws?.total||0;
    var l  = stats.fixtures?.loses?.total||0;

    html += '<div class="sdiv"><span class="sacc">◈</span> Season Statistics</div>'
      + '<div class="season-grid">'
      + sg('Played', pl, '')
      + sg('Won', w, 'var(--green)')
      + sg('Drawn', d, 'var(--amber)')
      + sg('Lost', l, 'var(--red)')
      + sg('Goals For', gf, 'var(--green)')
      + sg('Goals Ag.', ga, 'var(--red)')
      + sg('Clean Sheets', cs, 'var(--blue)')
      + sg('Scoreless', fts, 'var(--red)')
      + '</div>';
  }

  // H2H summary (for first fixture)
  if (h2hData && h2hData.length && fixtures.length) {
    html += renderH2H(fixtures[0], h2hData, team);
  }

  // Fixtures
  html += '<div class="sdiv"><span class="sacc">⚡</span> '
    + (fixtures.length ? 'Upcoming Fixtures — 2+ Goals Analysis' : 'Season Analysis — No Upcoming Fixtures Found')
    + '</div><div class="fx-list">';

  if (fixtures.length) {
    html += fixtures.map(function(fx,i){ return renderFx(fx, stats, team, i); }).join('');
  } else {
    // General analysis with no fixture
    html += renderGeneralFx(stats, team);
  }
  html += '</div>';

  document.getElementById('report').innerHTML = html;
}

function renderFx(fx, stats, team, idx) {
  var p = buildPred(stats, fx, team);
  var pct = (p.prob*100).toFixed(1);
  var col = p.vd==='likely'?'var(--green)':p.vd==='possible'?'var(--amber)':'var(--red)';
  var isH = fx.teams.home.id === team.id;

  var dt = new Date(fx.fixture.date);
  var dstr = dt.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
  var tstr = dt.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});

  function tblock(t, subj, cls) {
    var lg = t.logo
      ? '<img class="fxtlogo" src="'+t.logo+'" onerror="this.outerHTML=\'<div class=fxtlogo-ph>⚽</div>\'">'
      : '<div class="fxtlogo-ph">⚽</div>';
    return '<div class="fx-side '+cls+'">'
      + lg
      + '<div class="fxtname'+(subj?' subject':'')+'">'+esc(t.name)+'</div>'
      + '</div>';
  }

  var tagsHtml = p.tags.map(function(t){ return '<span class="tag '+t.c+'">'+t.l+'</span>'; }).join('');
  var formHtml = p.fc.length
    ? '<div class="form-row"><span class="flbl">FORM</span>'
      + p.fc.map(function(c){ return '<div class="fl '+c+'">'+c+'</div>'; }).join('')
      + '</div>' : '';

  return '<div class="fxcard" style="animation-delay:'+(idx*.09)+'s">'
    // header
    + '<div class="fx-hdr">'
    + (fx.league.logo?'<img src="'+fx.league.logo+'" style="width:18px;height:18px;object-fit:contain" onerror="this.remove()">':'')
    + '<span class="fx-league">'+esc(fx.league.name)+'</span>'
    + '<span style="font-family:Space Mono,monospace;font-size:10px;color:var(--m1)">'+esc(fx.league.country)+'</span>'
    + '<span class="fx-date">'+dstr+'</span>'
    + '</div>'
    // teams
    + '<div class="fx-teams">'
    + tblock(fx.teams.home, fx.teams.home.id===team.id, '')
    + '<div class="vs-block"><div class="vs-txt">VS</div><div class="vs-time">'+tstr+'</div></div>'
    + tblock(fx.teams.away, fx.teams.away.id===team.id, 'away')
    + '</div>'
    // prediction
    + '<div class="pred">'
    + '<div class="pred-top">'
    + '<div class="pred-num"><div class="pbig" style="color:'+col+';text-shadow:0 0 14px '+col+'44">'+pct+'</div><div><div class="ppct">%</div><div class="plab">2+ Goals<br>Probability</div></div></div>'
    + '<span class="vbadge '+p.vd+'">'+p.vl+'</span>'
    + '</div>'
    + '<div class="pbar"><div class="pbar-fill" style="width:'+pct+'%;background:'+col+'"></div></div>'
    + '<div class="mxgrid">'
    + mx('xG (adj)', p.xg, p.xgNum>1.7?'hi':'')
    + mx('λ Lambda', p.lam, '')
    + mx('BTTS Est.', (p.btts*100).toFixed(0)+'%', p.btts>.55?'hi':'')
    + mx('Over 2.5', (p.o25*100).toFixed(0)+'%', p.o25>.55?'hi':'')
    + mx('Goals/Gm', p.gs, parseFloat(p.gs)>1.6?'hi':'')
    + mx('Conceded', p.gc, parseFloat(p.gc)>1.7?'wa':'')
    + mx('Clean Sht%', p.cs+'%', parseFloat(p.cs)>35?'da':'')
    + mx('W/D/L', p.wins+'/'+p.draws+'/'+p.loss, '')
    + '</div>'
    + formHtml
    + (p.tags.length?'<div class="tags">'+tagsHtml+'</div>':'')
    + '<div class="analysis"><p>'+p.narrative+'</p></div>'
    + '</div>'
    + '</div>';
}

function renderGeneralFx(stats, team) {
  var p = buildPred(stats, null, team);
  var pct = (p.prob*100).toFixed(1);
  var col = p.vd==='likely'?'var(--green)':p.vd==='possible'?'var(--amber)':'var(--red)';
  var tagsHtml = p.tags.map(function(t){ return '<span class="tag '+t.c+'">'+t.l+'</span>'; }).join('');
  var formHtml = p.fc.length
    ? '<div class="form-row"><span class="flbl">FORM</span>'
      + p.fc.map(function(c){ return '<div class="fl '+c+'">'+c+'</div>'; }).join('')+'</div>' : '';

  return '<div class="fxcard">'
    + '<div class="fx-hdr"><span class="fx-league">General Season Analysis</span></div>'
    + '<div class="pred">'
    + '<div class="pred-top">'
    + '<div class="pred-num"><div class="pbig" style="color:'+col+';text-shadow:0 0 14px '+col+'44">'+pct+'</div><div><div class="ppct">%</div><div class="plab">2+ Goals<br>Probability</div></div></div>'
    + '<span class="vbadge '+p.vd+'">'+p.vl+'</span>'
    + '</div>'
    + '<div class="pbar"><div class="pbar-fill" style="width:'+pct+'%;background:'+col+'"></div></div>'
    + '<div class="mxgrid">'
    + mx('xG (adj)', p.xg, p.xgNum>1.7?'hi':'')
    + mx('λ Lambda', p.lam, '')
    + mx('BTTS Est.', (p.btts*100).toFixed(0)+'%', p.btts>.55?'hi':'')
    + mx('Over 2.5', (p.o25*100).toFixed(0)+'%', p.o25>.55?'hi':'')
    + mx('Goals/Gm', p.gs, parseFloat(p.gs)>1.6?'hi':'')
    + mx('Clean Sht%', p.cs+'%', parseFloat(p.cs)>35?'da':'')
    + '</div>'
    + formHtml
    + (p.tags.length?'<div class="tags">'+tagsHtml+'</div>':'')
    + '<div class="analysis"><p>'+p.narrative+'</p></div>'
    + '</div></div>';
}

function renderH2H(fx, h2hData, team) {
  var hId = fx.teams.home.id, aId = fx.teams.away.id;
  var hW=0, aW=0, draws=0;
  h2hData.forEach(function(m){
    var hg = m.goals.home, ag = m.goals.away;
    if (hg === null || ag === null) return;
    if (hg > ag) { if (m.teams.home.id===hId) hW++; else aW++; }
    else if (ag > hg) { if (m.teams.away.id===aId) aW++; else hW++; }
    else draws++;
  });
  var total = hW + aW + draws || 1;
  var hP = (hW/total*100).toFixed(0), aP = (aW/total*100).toFixed(0), dP = (draws/total*100).toFixed(0);

  return '<div class="sdiv"><span class="sacc">↔</span> Head-to-Head · Last '+h2hData.length+' Meetings</div>'
    + '<div style="background:var(--s1);border:1px solid var(--b1);border-radius:3px;padding:18px 20px;margin-bottom:4px">'
    + '<div class="h2h-row">'
    + '<span style="font-family:Space Mono,monospace;font-size:11px;color:var(--text);min-width:80px">'+esc(fx.teams.home.name)+'</span>'
    + '<div class="h2h-bar-wrap">'
    + '<div class="h2h-seg" style="width:'+hP+'%;background:var(--green)"></div>'
    + '<div class="h2h-seg" style="width:'+dP+'%;background:var(--amber)"></div>'
    + '<div class="h2h-seg" style="width:'+aP+'%;background:var(--red)"></div>'
    + '</div>'
    + '<span style="font-family:Space Mono,monospace;font-size:11px;color:var(--text);min-width:80px;text-align:right">'+esc(fx.teams.away.name)+'</span>'
    + '</div>'
    + '<div style="display:flex;justify-content:center;gap:20px;margin-top:10px;font-family:Space Mono,monospace;font-size:11px">'
    + '<span style="color:var(--green)">'+fx.teams.home.name+': '+hW+' wins</span>'
    + '<span style="color:var(--amber)">Draws: '+draws+'</span>'
    + '<span style="color:var(--red)">'+fx.teams.away.name+': '+aW+' wins</span>'
    + '</div></div>';
}

// ── HELPERS ─────────────────────────────────────────────────────
function mx(lbl, val, cls) {
  var c = cls==='hi'?'var(--green)':cls==='wa'?'var(--amber)':cls==='da'?'var(--red)':'var(--text)';
  return '<div class="mxbox '+cls+'"><div class="mxval" style="color:'+c+'">'+val+'</div><div class="mxlbl">'+lbl+'</div></div>';
}
function sg(lbl, val, col) {
  return '<div class="sg-cell"><div class="sg-val" style="color:'+(col||'var(--text)')+'">'+val+'</div><div class="sg-lbl">'+lbl+'</div></div>';
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showErr(msg) {
  document.getElementById('errmsg').textContent = '⚠ ' + msg;
  document.getElementById('errbox').style.display = 'block';
}
function hideErr() { document.getElementById('errbox').style.display = 'none'; }
function clearReport() {
  document.getElementById('report').style.display = 'none';
  document.getElementById('report').innerHTML = '';
  input.value = ''; input.focus();
}
</script>
